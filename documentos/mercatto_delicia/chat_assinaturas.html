<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"
/>

<title>Mercatto Sign • Documento</title>

<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
  rel="stylesheet"
/>

<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css"
  rel="stylesheet"
/>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>

<style>

:root{

  --gold:#d4af37;
  --gold2:#f7d774;

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter;
}

html,
body{

  width:100%;
  min-height:100%;

  background:
    linear-gradient(
      180deg,
      #020617,
      #0f172a
    );

  color:#fff;

}

body{

  overflow-x:hidden;

}

/* =====================================================
TOP
===================================================== */

.top{

  position:sticky;

  top:0;

  z-index:100;

  backdrop-filter:blur(16px);

  background:
    rgba(2,6,23,.88);

  border-bottom:
    1px solid rgba(255,255,255,.05);

  padding:20px 28px;

}

.logo{

  display:flex;
  align-items:center;
  gap:16px;

}

.logo-icon{

  width:62px;
  height:62px;

  border-radius:22px;

  background:
    linear-gradient(
      135deg,
      #d4af37,
      #f7d774
    );

  display:flex;
  align-items:center;
  justify-content:center;

  color:#000;

  font-size:28px;

}

.logo h1{

  font-size:28px;

  font-weight:900;

}

.logo p{

  margin-top:6px;

  color:#94a3b8;

  font-size:13px;

}

/* =====================================================
HERO
===================================================== */

.hero{

  position:relative;

  overflow:hidden;

  padding:70px 30px;

}

.hero::before{

  content:"";

  position:absolute;

  inset:0;

  background:
    radial-gradient(
      circle at top right,
      rgba(212,175,55,.18),
      transparent 28%
    );

}

.hero-card{

  position:relative;

  max-width:1300px;

  margin:auto;

  background:
    linear-gradient(
      180deg,
      rgba(15,23,42,.98),
      rgba(2,6,23,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  border-radius:42px;

  overflow:hidden;

  box-shadow:
    0 40px 120px rgba(0,0,0,.45);

}

/* =====================================================
BANNER
===================================================== */

.banner{

  position:relative;

  height:320px;

  overflow:hidden;

}

.banner img{

  width:100%;
  height:100%;

  object-fit:cover;

  filter:
    brightness(.42)
    saturate(1.2);

}

.banner-overlay{

  position:absolute;

  inset:0;

  background:
    linear-gradient(
      180deg,
      transparent,
      rgba(2,6,23,.96)
    );

}

.banner-content{

  position:absolute;

  left:50px;
  bottom:50px;

  z-index:5;

}

.banner-content h2{

  font-size:52px;

  font-weight:900;

  line-height:1;

}

.banner-content p{

  margin-top:16px;

  font-size:15px;

  color:#dbe3ec;

  max-width:800px;

}

/* =====================================================
CONTENT
===================================================== */

.content{

  padding:50px;

}

.grid{

  display:grid;

  grid-template-columns:
    repeat(
      auto-fit,
      minmax(260px,1fr)
    );

  gap:18px;

  margin-bottom:40px;

}

.card{

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.05);

  border-radius:28px;

  padding:24px;

}

.card small{

  color:#94a3b8;

  font-size:11px;

  font-weight:700;

}

.card h3{

  margin-top:12px;

  font-size:18px;

  font-weight:900;

}

/* =====================================================
DOCUMENTO
===================================================== */

.documento{

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.05);

  border-radius:34px;

  padding:40px;

  line-height:1.8;

  font-size:15px;

}

.documento h1{

  font-size:34px;

  font-weight:900;

  margin-bottom:24px;

}

.documento p{

  color:#dbe3ec;

  white-space:pre-wrap;

}

/* =====================================================
TIMELINE
===================================================== */

.timeline{

  margin-top:40px;

}

.timeline-item{

  display:flex;

  gap:18px;

  margin-bottom:22px;

}

.timeline-dot{

  width:18px;
  height:18px;

  border-radius:50%;

  margin-top:6px;

  background:
    linear-gradient(
      135deg,
      #d4af37,
      #f7d774
    );

}

.timeline-content{

  flex:1;

  background:
    rgba(255,255,255,.03);

  border:
    1px solid rgba(255,255,255,.05);

  border-radius:24px;

  padding:22px;

}

/* =====================================================
ASSINAR
===================================================== */

.assinar-box{

  margin-top:80px;

  background:
    linear-gradient(
      180deg,
      rgba(15,23,42,.98),
      rgba(2,6,23,.98)
    );

  border:
    1px solid rgba(255,255,255,.06);

  border-radius:36px;

  padding:40px;

}

.assinar-box h2{

  font-size:34px;

  font-weight:900;

}

.assinar-box p{

  margin-top:10px;

  color:#94a3b8;

}

/* =====================================================
FIELDS
===================================================== */

.grid-login{

  display:grid;

  grid-template-columns:
    repeat(
      auto-fit,
      minmax(260px,1fr)
    );

  gap:18px;

  margin-top:28px;

}

.field{

  display:flex;
  flex-direction:column;
  gap:8px;

}

.field label{

  font-size:12px;

  font-weight:900;

  color:#94a3b8;

}

.field input{

  width:100%;

  height:58px;

  border:none;

  border-radius:18px;

  padding:0 18px;

  outline:none;

  background:
    rgba(255,255,255,.05);

  border:
    1px solid rgba(255,255,255,.05);

  color:#fff;

}

/* =====================================================
CANVAS
===================================================== */

.signature-wrap{

  margin-top:28px;

  background:#fff;

  border-radius:28px;

  overflow:hidden;

}

#signature-pad{

  width:100%;
  height:320px;

  background:#fff;

}

.signature-actions{

  padding:20px;

  display:flex;
  justify-content:flex-end;
  gap:12px;

}

/* =====================================================
BUTTONS
===================================================== */

.btn{

  border:none;

  height:58px;

  padding:0 26px;

  border-radius:18px;

  cursor:pointer;

  font-size:13px;

  font-weight:900;

}

.btn-gold{

  background:
    linear-gradient(
      135deg,
      #d4af37,
      #f7d774
    );

  color:#000;

}

.btn-dark{

  background:
    rgba(255,255,255,.06);

  color:#fff;

}

/* =====================================================
RESPONSIVOS
===================================================== */

@media(max-width:900px){

  .banner-content{

    left:24px;
    right:24px;
    bottom:24px;

  }

  .banner-content h2{

    font-size:34px;

  }

  .content{

    padding:20px;

  }

  .documento{

    padding:24px;

  }

  .assinar-box{

    padding:24px;

  }

}

</style>
</head>
<body>

<div class="top">

  <div class="logo">

    <div class="logo-icon">

      <i class="ri-quill-pen-line"></i>

    </div>

    <div>

      <h1>Mercatto Sign</h1>

      <p>
        Documento digital premium
      </p>

    </div>

  </div>

</div>

<div class="hero">

  <div class="hero-card">

    <!-- =====================================================
    BANNER
    ===================================================== -->

    <div class="banner">

      <img
        src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?q=80&w=1800&auto=format&fit=crop"
      >

      <div class="banner-overlay"></div>

      <div class="banner-content">

        <h2 id="tituloDocumento">
          Carregando...
        </h2>

        <p id="empresaDocumento">

        </p>

      </div>

    </div>

    <!-- =====================================================
    CONTENT
    ===================================================== -->

    <div class="content">

      <!-- KPIS -->

      <div class="grid">

        <div class="card">

          <small>Status</small>

          <h3 id="statusDocumento">
            -
          </h3>

        </div>

        <div class="card">

          <small>Empresa</small>

          <h3 id="empresaCard">
            -
          </h3>

        </div>

        <div class="card">

          <small>Data</small>

          <h3 id="dataCard">
            -
          </h3>

        </div>

        <div class="card">

          <small>Local</small>

          <h3 id="localCard">
            -
          </h3>

        </div>

      </div>

      <!-- DOCUMENTO -->

      <div class="documento">

        <h1>
          Documento
        </h1>

        <p id="descricaoDocumento"></p>

      </div>

      <!-- TIMELINE -->

      <div class="timeline">

        <div id="timeline"></div>

      </div>

      <!-- ASSINAR -->

      <div class="assinar-box">

        <h2>
          Assinar documento
        </h2>

        <p>
          Role até o final e assine digitalmente
        </p>

        <div class="grid-login">

          <div class="field">

            <label>Usuário</label>

            <input
              id="usuario"
              placeholder="Digite o usuário"
            >

          </div>

          <div class="field">

            <label>Senha</label>

            <input
              type="password"
              id="senha"
              placeholder="Digite a senha"
            >

          </div>

        </div>

        <!-- CANVAS -->

        <div class="signature-wrap">

          <canvas id="signature-pad"></canvas>

          <div class="signature-actions">

            <button
              class="btn btn-dark"
              onclick="limparAssinatura()"
            >

              Limpar

            </button>

          </div>

        </div>

        <div style="
          margin-top:26px;
          display:flex;
          justify-content:flex-end;
        ">

          <button
            class="btn btn-gold"
            onclick="assinarDocumento()"
          >

            Assinar Documento

          </button>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

/* =====================================================
SUPABASE
===================================================== */

const supabaseClient =

  supabase.createClient(

    "https://dxkszikemntfusfyrzos.supabase.co",

    "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"

  )

/* =====================================================
GLOBALS
===================================================== */

const urlParams =
  new URLSearchParams(
    window.location.search
  )

const documentoId =
  urlParams.get("id")

let documento = null

let signaturePad = null

/* =====================================================
INIT
===================================================== */

window.onload = async ()=>{

  iniciarCanvas()

  await carregarDocumento()

}

/* =====================================================
CANVAS
===================================================== */

function iniciarCanvas(){

  const canvas =

    document.getElementById(
      "signature-pad"
    )

  canvas.width =
    canvas.offsetWidth

  canvas.height = 320

  signaturePad =
    new SignaturePad(canvas)

}

function limparAssinatura(){

  signaturePad.clear()

}

/* =====================================================
LOAD DOCUMENTO
===================================================== */

async function carregarDocumento(){

  const { data, error } =

    await supabaseClient

      .from(
        "assinaturas_documentos"
      )

      .select("*")

      .eq("id",documentoId)

      .single()

  if(error){

    alert(error.message)

    return

  }

  documento = data

  renderizarDocumento()

}

/* =====================================================
RENDER
===================================================== */

function renderizarDocumento(){

  document.getElementById(
    "tituloDocumento"
  ).innerText =

    documento.titulo || "-"

  document.getElementById(
    "empresaDocumento"
  ).innerText =

    documento.empresa || "-"

  document.getElementById(
    "statusDocumento"
  ).innerText =

    documento.status || "-"

  document.getElementById(
    "empresaCard"
  ).innerText =

    documento.empresa || "-"

  document.getElementById(
    "localCard"
  ).innerText =

    documento.local || "-"

  document.getElementById(
    "descricaoDocumento"
  ).innerText =

    documento.descricao || "-"

  document.getElementById(
    "dataCard"
  ).innerText =

    documento.data_documento

    ? new Date(
        documento.data_documento
      ).toLocaleString("pt-BR")

    : "-"

  renderizarTimeline()

}

/* =====================================================
TIMELINE
===================================================== */

function renderizarTimeline(){

  const timeline =
    document.getElementById(
      "timeline"
    )

  timeline.innerHTML = ""

  ;(documento.usuarios || [])
  .forEach(usuario=>{

    timeline.innerHTML += `

      <div class="timeline-item">

        <div class="timeline-dot"></div>

        <div class="timeline-content">

          <div style="
            font-size:18px;
            font-weight:900;
          ">

            ${usuario.nome}

          </div>

          <div style="
            margin-top:8px;
            color:#94a3b8;
          ">

            ${
              usuario.assinado

              ? "Documento assinado"

              : "Aguardando assinatura"
            }

          </div>

        </div>

      </div>

    `

  })

}

/* =====================================================
ASSINAR
===================================================== */

async function assinarDocumento(){

  const usuario =
    document.getElementById(
      "usuario"
    ).value

  const senha =
    document.getElementById(
      "senha"
    ).value

  if(signaturePad.isEmpty()){

    alert(
      "Faça sua assinatura"
    )

    return

  }

  const { data:user, error } =

    await supabaseClient

      .from("usuarios_do_sistema")

      .select("*")

      .eq("usuario",usuario)

      .eq("senha",senha)

      .single()

  if(error || !user){

    alert(
      "Usuário inválido"
    )

    return

  }

  const assinaturaPNG =

    signaturePad.toDataURL()

  const assinaturaJSON =

    signaturePad.toData()

  await supabaseClient

    .from(
      "assinaturas_registros"
    )

    .insert({

      documento_id:
        documentoId,

      usuario_id:
        user.id,

      usuario_nome:
        user.nome,

      assinatura_png:
        assinaturaPNG,

      assinatura_json:
        assinaturaJSON,

      navegador:
        navigator.userAgent,

      assinado:true,

      data_assinatura:
        new Date().toISOString()

    })

  documento.usuarios =
    (documento.usuarios || [])
    .map(u=>{

      if(u.id == user.id){

        return {

          ...u,

          assinado:true

        }

      }

      return u

    })

  await supabaseClient

    .from(
      "assinaturas_documentos"
    )

    .update({

      usuarios:
        documento.usuarios

    })

    .eq("id",documentoId)

  alert(
    "Documento assinado com sucesso"
  )

  location.reload()

}

</script>
</body>
</html>
